<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Sunton Express</title>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40px">Redirecting...</p>

  <script>
    const ua = navigator.userAgent;

    if (/iPhone|iPad|iPod/i.test(ua)) {
      window.location.href = "https://apps.apple.com/ca/app/sunton-express/id6752519944";

    } else if (/Android/i.test(ua)) {
      window.location.href = "https://play.google.com/store/apps/details?id=com.diuk.customer";

    } else {
      document.body.innerHTML = `
        <div style="font-family:sans-serif;text-align:center;margin-top:80px">
          <h2>Download Sunton Express</h2>
          <a href="https://apps.apple.com/ca/app/sunton-express/id6752519944"
             style="display:inline-block;margin:10px;padding:12px 24px;background:#000;color:#fff;border-radius:8px;text-decoration:none">
            📱 App Store
          </a>
          <a href="https://play.google.com/store/apps/details?id=com.diuk.customer"
             style="display:inline-block;margin:10px;padding:12px 24px;background:#00aa55;color:#fff;border-radius:8px;text-decoration:none">
            🤖 Google Play
          </a>
        </div>`;
    }
  </script>
</body>
</html>
